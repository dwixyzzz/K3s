# .github/workflows/deploy.yml
# Pipeline ini trigger setiap kali ada push ke branch main
#
# Arsitektur deploy:
#   GitHub Actions → SSH ke EC2 → kubectl dijalankan LOKAL di EC2
#   (K3s listen di 127.0.0.1:6443, tidak perlu expose port 6443 ke publik)
#
# GitHub Secrets yang dibutuhkan:
#   EC2_HOST     → public IP EC2, contoh: 3.210.198.54
#   EC2_USER     → username SSH, contoh: ubuntu
#   EC2_SSH_KEY  → isi file .pem (private key), paste as-is (multi-line)

name: Build & Deploy to K3s

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/workshop-k3s

jobs:
  # ── Job 1: Build & Push Docker Image ──────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Job 2: Deploy ke K3s via SSH ──────────────────────────────
  deploy:
    name: Deploy to K3s via SSH
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Salin folder k8s/ ke EC2 via SCP
      - name: Copy k8s manifests ke EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/"
          target: "~/workshop-k3s"

      # SSH ke EC2 lalu jalankan kubectl di sana (lokal, 127.0.0.1:6443)
      # Tidak perlu kubeconfig eksternal, tidak perlu port 6443 terbuka
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Timeout lebih panjang untuk EC2 kecil (t2.micro dll)
          command_timeout: 5m
          script: |
            # ~/.kube/config sudah disiapkan oleh install-k3s.sh untuk user ubuntu
            export KUBECONFIG=$HOME/.kube/config

            echo "==> Cek K3s service running..."
            sudo systemctl is-active k3s || (echo "K3s tidak running! Mencoba restart..." && sudo systemctl restart k3s && sleep 20)

            echo "==> Tunggu API server siap..."
            for i in $(seq 1 12); do
              if kubectl get nodes --request-timeout=10s > /dev/null 2>&1; then
                echo "  API server siap!"
                break
              fi
              echo "  ... ($i/12) API server belum siap, tunggu 10s..."
              sleep 10
            done

            echo "==> Applying K8s manifests..."
            # --validate=false: skip download OpenAPI schema (penyebab TLS timeout)
            kubectl apply -f ~/workshop-k3s/k8s/ --validate=false

            echo "==> Waiting for rollout..."
            kubectl rollout status deployment/workshop-app --timeout=120s

            echo "==> Status akhir:"
            kubectl get pods -l app=workshop-app
            kubectl get svc workshop-app
            kubectl get ingress workshop-app 2>/dev/null || true
